services:
  backend:
    image: ${IMAGE:-rpmcares-backend}:${TAG:-latest}
    container_name: rpmcares-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-4000}:${PORT:-4000}"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:'+(process.env.PORT||4000)+'/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
